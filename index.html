<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0B1B2B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Field Note" />
<title>Field Note — identify anything in nature</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.anthropic.com" crossorigin>
<link rel="preconnect" href="https://api.inaturalist.org" crossorigin>
<link rel="dns-prefetch" href="https://api.bigdatacloud.net">
<link rel="dns-prefetch" href="https://tile.openstreetmap.org">
<link rel="dns-prefetch" href="https://unpkg.com">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
  :root{
    --abyss:#0A1622; --prussian:#0F2638; --prussian-2:#16344E; --mount:#05101B;
    --cyan:#7FC6D8; --cyan-deep:#3F8AA6; --chalk:#EAF2F4; --slate:#9DB4C2;
    --gild:#D8B26A; --gild-soft:#B79352; --ember:#E08A5B;
    --line:rgba(127,198,216,.24); --line-soft:rgba(127,198,216,.13); --glow:rgba(127,198,216,.22);
    --font-display:'Cormorant Garamond',Georgia,serif;
    --font-body:'Spectral','Newsreader',Georgia,serif;
    --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    /* legacy aliases so any stray rule still resolves */
    --paper:var(--abyss); --card:var(--prussian); --ink:var(--chalk); --ink-2:var(--slate);
    --green:var(--cyan); --verdigris:var(--cyan); --tag:var(--ember); --amber:var(--gild); --faded:var(--slate);
    --shadow:rgba(0,0,0,.5); --line2:var(--line);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0;padding:0}
  *{-webkit-tap-highlight-color:transparent}
  ::selection{background:var(--cyan);color:var(--abyss)}
  input,textarea,select,button{font-family:inherit}
  input,textarea{-webkit-appearance:none;appearance:none;border-radius:0}
  input[type="search"]::-webkit-search-decoration,input[type="search"]::-webkit-search-cancel-button{-webkit-appearance:none}
  body{background:var(--abyss);color:var(--chalk);font-family:var(--font-body);font-weight:400;-webkit-font-smoothing:antialiased;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(140% 70% at 50% -10%, #16344E 0%, #0E2438 40%, var(--abyss) 80%),radial-gradient(rgba(180,220,235,.28) .6px,transparent .7px);background-size:auto,9px 9px}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;box-shadow:inset 0 0 200px rgba(3,9,16,.65)}
  #root{position:relative;z-index:1}
  .wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 4px) calc(18px + env(safe-area-inset-right)) calc(70px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left))}

  .mast{padding:26px 0 0;text-align:center;position:relative}
  .mast .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.46em;text-transform:uppercase;color:var(--cyan-deep);text-indent:.46em}
  .mast h1{font-family:var(--font-display);font-weight:600;font-size:50px;line-height:.92;margin:6px 0 0;letter-spacing:.005em;color:var(--chalk);text-shadow:0 0 26px rgba(127,198,216,.18)}
  .mast::after{content:"";display:block;height:0;border-bottom:1px solid var(--line);margin-top:16px;-webkit-mask:linear-gradient(90deg,transparent,#000 16%,#000 84%,transparent);mask:linear-gradient(90deg,transparent,#000 16%,#000 84%,transparent)}

  .tabs{display:flex;gap:0;border-bottom:1px solid var(--line);position:sticky;top:0;background:linear-gradient(var(--abyss),rgba(10,22,34,.92));backdrop-filter:blur(6px);z-index:5}
  .tab{flex:1;background:none;border:none;padding:13px 4px 12px;cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--slate);position:relative;transition:color .18s}
  .tab + .tab::before{content:"";position:absolute;left:0;top:8px;bottom:8px;border-left:1px solid var(--line-soft)}
  .tab.on{color:var(--chalk)}
  .tab.on::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:2px;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .tab:focus-visible{outline:2px solid var(--cyan);outline-offset:-3px}

  /* ── Daily Light: the centerpiece ── */
  .daily{position:relative;margin-top:22px;padding:22px 22px 20px;background:radial-gradient(120% 90% at 50% -20%, rgba(216,178,106,.12), transparent 60%), var(--prussian);border:1px solid rgba(216,178,106,.34);border-radius:5px;box-shadow:0 0 0 1px rgba(216,178,106,.05),0 14px 36px rgba(0,0,0,.5);overflow:hidden;animation:develop .7s ease both}
  .daily::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,var(--gild),transparent);opacity:.9}
  .daily-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:13px}
  .daily-eyebrow{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--gild)}
  .daily-date{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate)}
  .daily-verse{font-family:var(--font-display);font-weight:500;font-style:italic;font-size:25px;line-height:1.34;letter-spacing:.004em;color:var(--chalk);margin:0}
  .daily-ref{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gild);margin-top:12px}
  .daily-note{font-family:var(--font-body);font-style:italic;font-size:14.5px;line-height:1.5;color:var(--slate);margin:12px 0 0;padding-top:12px;border-top:1px solid rgba(216,178,106,.2)}

  .hero{padding:24px 0 6px}
  .collect{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;width:100%;border:1px solid var(--line);border-radius:5px;background:radial-gradient(120% 100% at 50% 0%, rgba(127,198,216,.10), transparent 62%), var(--prussian);padding:42px 22px;cursor:pointer;color:var(--chalk);box-shadow:0 0 0 1px rgba(127,198,216,.05),0 12px 30px rgba(0,0,0,.45);transition:transform .16s cubic-bezier(.2,.7,.3,1),box-shadow .16s,border-color .16s}
  .collect:hover{transform:translateY(-2px);border-color:rgba(127,198,216,.5);box-shadow:0 0 0 1px var(--glow),0 16px 38px rgba(0,0,0,.5),0 0 40px rgba(127,198,216,.12)}
  .collect:active{transform:translateY(1px)}
  .collect:focus-visible{outline:2.5px solid var(--cyan);outline-offset:3px}
  .collect .lens{font-size:36px;line-height:1;color:var(--cyan);text-shadow:0 0 22px rgba(127,198,216,.6)}
  .collect .big{font-family:var(--font-display);font-weight:600;font-size:27px;letter-spacing:.01em}
  .collect .hint{font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--slate)}
  .altrow{display:flex;justify-content:center;margin-top:16px}
  .altbtn{background:none;border:none;color:var(--cyan);font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;padding:8px 10px;border-bottom:1px solid var(--cyan-deep)}
  .altbtn:focus-visible{outline:2px solid var(--cyan);outline-offset:3px}
  .hide{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

  .forager{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:14px 16px;border:1px solid var(--line-soft);border-radius:4px;background:var(--prussian)}
  .forager .lbl{font-size:14px;color:var(--chalk)}
  .forager .lbl b{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);display:block;margin-bottom:2px}
  .forager .lbl small{color:var(--slate);font-size:12.5px}
  .switch{width:48px;height:27px;border:1px solid var(--line);background:var(--abyss);border-radius:14px;position:relative;cursor:pointer;flex:0 0 auto;transition:background .16s,border-color .16s,box-shadow .16s}
  .switch i{position:absolute;top:3px;left:3px;width:19px;height:19px;background:var(--slate);border-radius:50%;transition:left .17s cubic-bezier(.2,.7,.3,1),background .17s}
  .switch.on{background:rgba(224,138,91,.22);border-color:var(--ember);box-shadow:0 0 14px rgba(224,138,91,.3)}
  .switch.on i{left:25px;background:var(--ember)}
  .switch:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .stage{margin-top:22px;background:var(--prussian);border:1px solid var(--line);border-radius:5px;box-shadow:0 12px 30px rgba(0,0,0,.45);padding:17px}
  .stage h2{font-family:var(--font-display);font-weight:600;font-size:24px;margin:0 0 3px;color:var(--chalk)}
  .stage .note{font-size:13.5px;color:var(--slate);margin:0 0 14px;line-height:1.45}
  .thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .thumb{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:3px;overflow:hidden;background:var(--mount)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .x{position:absolute;top:3px;right:3px;width:22px;height:22px;border:none;background:rgba(5,16,27,.86);color:var(--chalk);font-size:13px;cursor:pointer;line-height:1;border-radius:3px}
  .addtile{aspect-ratio:1;border:1px dashed var(--cyan-deep);border-radius:3px;background:transparent;color:var(--cyan);font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .addtile span{font-size:22px;line-height:1}
  .addtile:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .loc{display:flex;align-items:center;gap:8px;margin-top:14px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;color:var(--cyan);text-transform:uppercase}
  .loc .clr{background:none;border:none;color:var(--ember);cursor:pointer;font-family:inherit;font-size:10.5px;text-decoration:underline;padding:0}
  .loc.dim{color:var(--slate)}
  .idbtn{width:100%;margin-top:16px;font-family:var(--font-mono);font-size:12.5px;letter-spacing:.2em;text-transform:uppercase;padding:16px;border:1px solid var(--cyan);border-radius:4px;background:linear-gradient(var(--cyan),var(--cyan-deep));color:#06131C;font-weight:500;cursor:pointer;box-shadow:0 0 22px rgba(127,198,216,.24);transition:transform .14s,box-shadow .14s,filter .14s}
  .idbtn:hover{filter:brightness(1.06);box-shadow:0 0 30px rgba(127,198,216,.4)}
  .idbtn:active{transform:translateY(1px)}
  .idbtn:disabled{opacity:.4;cursor:default;box-shadow:none;filter:none}
  .idbtn:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}

  .working{padding:48px 0;text-align:center}
  .working img{width:124px;height:124px;object-fit:cover;border:1px solid var(--cyan);border-radius:4px;box-shadow:0 0 26px rgba(127,198,216,.25);filter:saturate(.95)}
  .working .label{font-family:var(--font-mono);font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--cyan);margin-top:20px}
  .working .step{font-style:italic;color:var(--slate);font-size:14px;margin-top:6px}
  .dots::after{content:"";animation:dots 1.4s steps(4,end) infinite}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}
  @keyframes develop{from{opacity:0;transform:translateY(8px);filter:brightness(.5) saturate(.5)}to{opacity:1;transform:none;filter:none}}

  .sheet{position:relative;background:var(--prussian);border:1px solid var(--line);border-radius:5px;box-shadow:0 16px 40px rgba(0,0,0,.5);margin-top:20px;overflow:hidden;animation:develop .55s ease both}
  .mount{position:relative;background:var(--mount)}
  .mount img{display:block;width:100%;max-height:56vh;object-fit:contain}
  .corner{position:absolute;width:13px;height:13px;border:0;z-index:2}
  .corner::before,.corner::after{content:"";position:absolute;background:var(--cyan);box-shadow:0 0 6px var(--glow)}
  .corner::before{left:0;right:0;top:50%;height:1.5px;transform:translateY(-50%)}
  .corner::after{top:0;bottom:0;left:50%;width:1.5px;transform:translateX(-50%)}
  .corner.tl{top:9px;left:9px}.corner.tr{top:9px;right:9px}.corner.bl{bottom:9px;left:9px}.corner.br{bottom:9px;right:9px}
  .stamp{position:absolute;top:14px;right:14px;z-index:3;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);border:1.5px solid var(--cyan);border-radius:50%;width:78px;height:78px;display:flex;align-items:center;justify-content:center;transform:rotate(-10deg);text-align:center;line-height:1.18;background:radial-gradient(circle,rgba(8,22,32,.82),rgba(8,22,32,.5));box-shadow:0 0 18px rgba(127,198,216,.45),0 0 0 4px rgba(127,198,216,.12) inset;animation:sealSet .55s cubic-bezier(.2,.8,.3,1) both}
  @keyframes sealSet{0%{opacity:0;transform:rotate(-28deg) scale(1.5)}55%{opacity:1}100%{opacity:1;transform:rotate(-10deg) scale(1)}}
  .strip{display:flex;gap:6px;padding:9px;background:var(--mount);border-top:1px solid var(--line-soft)}
  .strip img{width:46px;height:46px;object-fit:cover;border:1px solid var(--line);border-radius:2px}
  .body{padding:22px 22px 24px}
  .cat{font-family:var(--font-mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gild);display:inline-block}
  .name{font-family:var(--font-display);font-weight:600;font-size:38px;line-height:1.02;margin:8px 0 2px;letter-spacing:.005em;color:var(--chalk)}
  .binom{font-style:italic;font-family:var(--font-display);font-weight:500;font-size:20px;color:var(--cyan)}

  .conf{margin:18px 0}
  .conf .row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
  .bar{height:7px;background:var(--abyss);border:1px solid var(--line-soft);border-radius:4px;position:relative;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-deep),var(--cyan));box-shadow:0 0 12px var(--glow)}
  .bar.lo i{background:linear-gradient(90deg,#b85a3e,var(--ember));box-shadow:0 0 12px rgba(224,138,91,.4)}
  .bar.mid i{background:linear-gradient(90deg,var(--gild-soft),var(--gild));box-shadow:0 0 12px rgba(216,178,106,.4)}

  .coach{margin-top:18px;border:1px solid rgba(216,178,106,.4);border-radius:4px;background:rgba(216,178,106,.07);padding:14px 16px}
  .coach h3{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gild);margin:0 0 8px}
  .coach ul{margin:0 0 12px;padding-left:18px}.coach li{font-size:14.5px;line-height:1.5;margin-bottom:4px;color:var(--chalk)}
  .coach .cbtn{width:100%;font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:12px;border:1px solid var(--gild);border-radius:4px;background:rgba(216,178,106,.14);color:var(--gild);cursor:pointer}

  .tagline{display:flex;flex-wrap:wrap;gap:8px 16px;margin:16px 0;padding:12px 14px;background:var(--abyss);border:1px solid var(--line-soft);border-radius:4px}
  .chip{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate)}
  .chip b{color:var(--cyan);font-weight:500}
  .summary{font-size:17.5px;line-height:1.6;margin:8px 0 0;color:var(--chalk)}
  .block{margin-top:20px;border-top:1px solid var(--line-soft);padding-top:16px}
  .block h3{font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);margin:0 0 9px}
  .block ul{margin:0;padding-left:18px}
  .block li{font-size:15.5px;line-height:1.6;margin-bottom:5px;color:var(--chalk)}
  .block p{margin:0;font-size:15.5px;line-height:1.6;color:var(--chalk)}

  .alt{border:1px solid var(--line-soft);border-radius:4px;padding:12px 13px;margin-bottom:8px;background:var(--abyss);cursor:pointer;width:100%;text-align:left;transition:border-color .14s,transform .14s,box-shadow .14s}
  .alt:hover{border-color:var(--cyan);transform:translateX(2px);box-shadow:0 0 18px rgba(127,198,216,.12)}
  .alt:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .alt .an{font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--chalk)}
  .alt .as{font-style:italic;color:var(--cyan);font-size:13px}
  .alt .ac{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--slate);float:right;text-transform:uppercase}
  .alt .aw{font-size:14px;line-height:1.5;margin-top:5px;color:var(--slate)}
  .alt .promote{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-top:6px;display:block}
  .conf-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px dotted var(--line-soft)}
  .conf-item:last-child{border-bottom:none}
  .conf-item .nm{font-family:var(--font-display);font-weight:600;font-size:17px;flex:0 0 38%;color:var(--chalk)}
  .conf-item .tl{font-size:14px;line-height:1.45;flex:1;color:var(--slate)}

  .safety{margin-top:20px;border:1px solid;border-radius:4px;padding:14px 15px;display:flex;gap:11px;align-items:flex-start}
  .safety .ic{font-size:18px;line-height:1.2}
  .safety .txt{font-size:14.5px;line-height:1.5}
  .safety.danger{border-color:var(--ember);background:rgba(224,138,91,.1)}.safety.danger .ic{color:var(--ember)}.safety.danger h4{color:var(--ember)}
  .safety.caution{border-color:var(--gild);background:rgba(216,178,106,.1)}.safety.caution .ic{color:var(--gild)}.safety.caution h4{color:var(--gild)}
  .safety.safe{border-color:var(--cyan);background:rgba(127,198,216,.1)}.safety.safe .ic{color:var(--cyan)}.safety.safe h4{color:var(--cyan)}
  .safety h4{margin:0 0 2px;font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase}
  .safety .txt{color:var(--chalk)}

  .verify{margin-top:22px;border-top:1px solid var(--line-soft);padding-top:18px}
  .verify h3{font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);margin:0 0 11px}
  .vrow{display:flex;gap:10px}
  .vinput{width:100%;font-family:var(--font-body);font-size:16px;padding:12px;border:1px solid var(--line);border-radius:4px;background:var(--abyss);color:var(--chalk);margin-bottom:10px}
  .vinput::placeholder{color:var(--slate)}
  .vinput:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(127,198,216,.18)}
  .verified-note{margin-top:22px;border-top:1px solid var(--line-soft);padding-top:16px;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);display:flex;align-items:center;gap:8px}
  .verified-note span{font-size:16px}

  .actions{display:flex;gap:10px;margin-top:22px}
  .savedhint{margin-top:10px;text-align:center;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate)}
  .delrow{margin-top:8px;text-align:center}
  .dellink{background:none;border:none;color:var(--ember);font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-bottom:1px solid rgba(224,138,91,.5);padding:2px 0}
  .dellink:focus-visible{outline:2px solid var(--ember);outline-offset:2px}
  .filterbar{margin-top:14px}
  .searchbox{width:100%;font-family:var(--font-body);font-size:16px;padding:11px 13px;border:1px solid var(--line);border-radius:4px;background:var(--prussian);color:var(--chalk)}
  .searchbox::placeholder{color:var(--slate)}
  .searchbox:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(127,198,216,.18)}
  .catrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
